{% extends 'admin/base.html' %}
{% block content %}
<div class="admin-header">
    <h1>标签管理</h1>
</div>

<div class="card">
    <div class="card-header">
        <h2>新建标签</h2>
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('admin.tags_mgmt') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">标签名称</label>
                    <input type="text" name="name" id="name" class="form-control" placeholder="输入标签名称" required>
                </div>
                <div class="form-group form-group-btn">
                    <button type="submit" class="btn btn-primary">创建标签</button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <table class="table">
        <thead>
            <tr>
                <th>名称</th>
                <th>文章数</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for tag in tags %}
            <tr>
                <td>{{ tag.name }}</td>
                <td>{{ tag.post_count }}</td>
                <td class="actions">
                    <form method="POST" action="{{ url_for('admin.tag_delete', tag_id=tag.id) }}" style="display:inline" onsubmit="return confirm('确定删除此标签吗？')">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btn-sm btn-danger">删除</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" class="text-center">暂无标签</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
