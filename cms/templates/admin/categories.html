{% extends 'admin/base.html' %}
{% block content %}
<div class="admin-header">
    <h1>分类管理</h1>
</div>

<div class="card">
    <div class="card-header">
        <h2>新建分类</h2>
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('admin.categories_mgmt') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">分类名称</label>
                    <input type="text" name="name" id="name" class="form-control" placeholder="输入分类名称" required>
                </div>
                <div class="form-group">
                    <label for="description">描述</label>
                    <input type="text" name="description" id="description" class="form-control" placeholder="可选描述">
                </div>
                <div class="form-group form-group-btn">
                    <button type="submit" class="btn btn-primary">创建分类</button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <table class="table">
        <thead>
            <tr>
                <th>名称</th>
                <th>描述</th>
                <th>文章数</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for cat in categories %}
            <tr>
                <td>{{ cat.name }}</td>
                <td>{{ cat.description or '-' }}</td>
                <td>{{ cat.post_count }}</td>
                <td class="actions">
                    <a href="{{ url_for('admin.category_edit', cat_id=cat.id) }}" class="btn btn-sm btn-edit">编辑</a>
                    <form method="POST" action="{{ url_for('admin.category_delete', cat_id=cat.id) }}" style="display:inline" onsubmit="return confirm('确定删除此分类吗？')">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btn-sm btn-danger">删除</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="text-center">暂无分类</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
